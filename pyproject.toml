[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
markers = [
    "pgvector_integration: optional real Postgres/pgvector smoke tests, skipped unless explicitly enabled",
    "llm_adapter_integration: optional real LLM/framework adapter smoke tests, skipped unless explicitly enabled",
]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests"]
extend-exclude = [
    ".tools",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
]

[tool.mypy]
python_version = "3.11"
files = ["src"]
mypy_path = "src"
namespace_packages = true
explicit_package_bases = true
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = false
warn_redundant_casts = false
warn_return_any = false
strict_optional = false
disable_error_code = [
    "arg-type",
    "assignment",
    "attr-defined",
    "call-overload",
    "no-redef",
    "return-value",
    "union-attr",
]
